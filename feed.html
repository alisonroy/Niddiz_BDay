<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Memory Feed | Mehwish Birthday">
    <title>Memory Feed - Mehwish Birthday</title>
    <link rel="stylesheet" href="assets/css/feed.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body class="instagram-feed-body">
    <div class="ig-main-wrapper">
        <!-- Header -->
        <header class="ig-header">
            <div class="ig-header-left">
                <a href="index.html" class="ig-back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>
            <div class="ig-header-center">
                <h1 class="ig-logo">
                    <i class="fa-solid fa-heart"></i> Memories
                </h1>
            </div>
            <div class="ig-header-right">
                <button class="ig-theme-toggle" id="themeToggle" title="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Stories Section -->
        <div class="ig-stories-container">
            <div class="ig-stories" id="storiesContainer">
                <!-- Stories will be inserted here -->
            </div>
        </div>

        <!-- Main Feed -->
        <div class="ig-feed-wrapper">
            <div class="ig-feed" id="instagramFeed">
                <!-- Posts will be inserted here -->
            </div>
            <div class="ig-loading" id="loadingSpinner" style="display: none;">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Sidebar (Desktop) -->
        <div class="ig-sidebar">
            <div class="ig-sidebar-sticky">
                <div class="ig-sidebar-card">
                    <h3>Memories</h3>
                    <p>Celebrating beautiful moments together! 💕</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for expanded view -->
    <div class="ig-modal" id="postModal">
        <span class="ig-modal-close">&times;</span>
        <div class="ig-modal-content">
            <div class="ig-modal-image">
                <img id="modalImage" src="" alt="">
            </div>
            <div class="ig-modal-details">
                <div class="ig-modal-header">
                    <div class="ig-modal-info">
                        <div class="ig-user-avatar"></div>
                        <div>
                            <p class="ig-modal-user">Dear Mehwish</p>
                            <p class="ig-modal-time">Birthday Memories</p>
                        </div>
                    </div>
                </div>
                <div class="ig-modal-caption">
                    <p id="modalCaption"></p>
                </div>
                <div class="ig-modal-stats">
                    <span id="modalLikes">0</span> likes
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/feed.js"></script>
</body>

</html>
